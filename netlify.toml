[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/app-state"
  to = "/.netlify/functions/app-state"
  status = 200

[[redirects]]
  from = "/api/app-state/*"
  to = "/.netlify/functions/app-state/:splat"
  status = 200

[[redirects]]
  from = "/api/app-attachments"
  to = "/.netlify/functions/app-attachments"
  status = 200
